name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    env:
      GROQ_API_KEY: ci-stub
      GOOGLE_API_KEY: ci-stub
      TAVILY_API_KEY: ci-stub
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      - name: Sync dependencies
        run: uv sync --all-extras --dev

      - name: Lint
        run: uv run ruff check app/ tests/

      - name: Tests
        run: uv run pytest -v
